name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
env:
  TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
  TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
jobs:
  create-release:
    runs-on: windows-latest
    outputs:
      upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - id: create-release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
  build-tauri:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install system deps
        run: choco install -y mingw
      - name: Build frontend
        run: npm ci && npm run build
      - name: Build Tauri app
        run: npx tauri build --bundles msi,nsis
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      - name: Upload MSI
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/msi/*.msi
          tag_name: ${{ github.ref_name }}
      - name: Upload NSIS
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/nsis/*.exe
          tag_name: ${{ github.ref_name }}
      - name: Generate update.json
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}" -replace "^v", ""
          $MSI_FILE = Get-ChildItem "target/release/bundle/msi/*.msi"
          $SIG_FILE = "$($MSI_FILE.FullName).sig"
          $SIGNATURE = if (Test-Path $SIG_FILE) { Get-Content $SIG_FILE -Raw } else { "" }
          @"
          {
            "version": "$VERSION",
            "notes": "See release notes on GitHub",
            "pub_date": "$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ' -AsUTC)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/thermaltrue/wms/releases/download/${{ github.ref_name }}/$($MSI_FILE.Name)"
              }
            }
          }
          "@ > update.json
      - name: Upload update.json
        uses: softprops/action-gh-release@v2
        with:
          files: update.json
          tag_name: ${{ github.ref_name }}
