name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
env:
  TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
  TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
  WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
  WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v5
      - id: create-release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: msi,nsis
            platform-key: windows-x86_64
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            bundles: dmg
            platform-key: darwin-aarch64
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            platform-key: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.rust-target }}
      - name: Install Windows dependencies
        if: matrix.os == 'windows-latest'
        run: choco install -y mingw
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get -qq update
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          if command -v brew &> /dev/null; then
            echo "Homebrew available"
          fi
      - name: Build frontend
        run: npm ci && npm run build
      - name: Check Windows certificate
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) {
            Write-Host "::warning::WINDOWS_CERTIFICATE secret not set. Windows installer will be unsigned."
          } else {
            Write-Host "WINDOWS_CERTIFICATE secret found. Will sign the installer."
          }

      - name: Import Windows certificate
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path certificate -Force
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item -Path certificate/tempCert.txt
          $thumb = (Import-PfxCertificate -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)
          ).Thumbprint
          Write-Host "Certificate imported with thumbprint: $thumb"
          echo "TAURI_WINDOWS_CERTIFICATE_THUMBPRINT=$thumb" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Build Tauri app
        run: npx tauri build --bundles ${{ matrix.bundles }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/dmg/*.dmg
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
      - name: Upload signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.platform-key }}
          path: |
            target/release/bundle/msi/*.sig
            target/release/bundle/nsis/*.sig
            target/release/bundle/dmg/*.sig
            target/release/bundle/deb/*.sig
            target/release/bundle/appimage/*.sig
          if-no-files-found: ignore
  generate-update-json:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all signatures
        uses: actions/download-artifact@v4
        with:
          pattern: sig-*
          path: sig-artifacts
      - name: Generate update.json
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}" -replace "^v", ""
          $Repo = "${{ github.repository }}"
          $Tag = "${{ github.ref_name }}"
          $PubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $platforms = @{}
          $sigDirs = Get-ChildItem -Path "sig-artifacts" -Directory -ErrorAction SilentlyContinue
          foreach ($dir in $sigDirs) {
              $platformKey = $dir.Name -replace "^sig-", ""
              $sigFile = Get-ChildItem -Path $dir.FullName -Filter "*.sig" -Recurse | Select-Object -First 1
              if (-not $sigFile) {
                  Write-Warning "No .sig file found in $($dir.Name)"
                  continue
              }

              $signature = (Get-Content $sigFile.FullName -Raw).Trim()
              $installerName = $sigFile.Name -replace "\.sig$", ""
              $downloadUrl = "https://github.com/$Repo/releases/download/$Tag/$installerName"

              $platforms[$platformKey] = @{
                  signature = $signature
                  url = $downloadUrl
              }

              Write-Host "  $platformKey : $installerName"
          }

          if ($platforms.Count -eq 0) {
              Write-Warning "No signature files found. update.json will have empty platforms (auto-update disabled)."
          }

          $json = @{
              version  = $Version
              notes    = "See release notes on GitHub"
              pub_date = $PubDate
              platforms = $platforms
          } | ConvertTo-Json -Depth 5

          Set-Content -Path "update.json" -Value $json
          Write-Host "`nupdate.json written:"
          Write-Host $json

      - name: Upload update.json
        uses: softprops/action-gh-release@v3
        with:
          files: update.json
